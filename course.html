<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:'poppins', sans-serif;
    }
    body{
        background-color: linear-gradient(to right, #4facfe, #00f2fe);
        display:flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
     }
     .container {
        background-color: white;
        padding: 30px, 40px;
        border-radius:15px;
        box-shadow: 0 4px rgba(0,0,0,0.1);
        width: 400px;
     }
     h1{
        text-align: center;
        color: #333;
        margin-bottom: 20px;
     }
     .form-group{
        margin-bottom: 15px;
     }
     label{
        display: block;
        color: #333;
        margin-bottom: 5px;
        font-weight: 600;
     }
     input, select, textarea{
        width: 100%;
        padding: 10px;
        border: 1px solid #aaa;
        border-radius: 8px;
        outline: none;
        transition: 0.3s;
     }
     input:focus, select:focus, textarea:focus{
        border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
     }
     .radio-group label{
        margin-right: 10px;
     }
     button{
        width: 100%;
        padding: 12px;
        background: linear-gradient(to right, #00c6ff, #0072ff);
        color: white;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
     }
     button:hover{
        background: linear-gradient(to right, #0072ff, #00c6ff);
     }
</style>
<body>
    <div class="container">
        <h1>Course Registration Form</h1>
        <form>
            <div class="form-group">
                <label for="fullname">Full Nmae:</label>
                <input type="text" id="fulname"
                placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email"
                placeholder="Enter your full email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone"
                placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label for="course">Select Course:</label>
                <select id="course" required>
                    <option value="">--Select a XCourse--</option>
                    <option value="web">Web Development</option>
                    <option value="java">Java Programming</option>
                    <option value="python">Python for Beginners</option>
                    </select>
            </div>

            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label><input tupe="radio" name="gender"
                    value="male" required>Male/label>
                    <label><input type="radio" name="gender
                    value="other">Other</label>
                </div>
            </div>
            <div class="form-group">
                <label for="message">Additional Notes:</label>
                <textarea id="message" rows="4"
                placeholder="Write your message..."></textarea>
            </div>
            <button type="submit">Register</button>
            </form>
    </div>
    
</body>
</html>
